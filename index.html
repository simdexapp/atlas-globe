<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#5cb5ff" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Atlas — interactive 3D globe with high-detail surface mode." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="Atlas Globe" />
    <meta property="og:description" content="Interactive 3D Earth — orbit the planet, fly to any location, switch to high-detail surface mode." />
    <meta property="og:type" content="website" />
    <title>Atlas — 3D Globe</title>
  </head>
  <body>
    <div id="root">
      <div id="splash" aria-hidden="true">
        <div class="splash-mark"></div>
        <div class="splash-label">ATLAS</div>
        <div class="splash-bar"><span></span></div>
      </div>
    </div>
    <script>
      document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gestureend', function (e) { e.preventDefault(); }, { passive: false });
      var lastTouch = 0;
      document.addEventListener('touchend', function (e) {
        var now = Date.now();
        if (now - lastTouch < 320) e.preventDefault();
        lastTouch = now;
      }, { passive: false });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
