<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#5cb5ff" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Atlas — interactive 3D globe with high-detail surface mode." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <meta property="og:title" content="Atlas Globe" />
    <meta property="og:description" content="Interactive 3D Earth — orbit the planet, fly to any location, switch to high-detail surface mode." />
    <meta property="og:type" content="website" />
    <title>Atlas — 3D Globe</title>
    <!--
      Preconnect hints — open TCP+TLS to the data hosts the user is most
      likely to hit during their first interaction. Saves roughly the cost
      of one full handshake per host (~100-300ms on cold cache, more on
      mobile networks). We can't preconnect everything, so this is gated
      to what most sessions actually fetch:
        • Cesium ion: terrain + Bing aerial imagery (Surface mode default)
        • OpenStreetMap raster: fallback imagery
        • USGS: earthquakes (auto-loaded with default layers)
        • Nominatim: 'fly to anywhere' geocoding (Cmd+K + Search)
        • NASA EONET: natural events
      Aircraft / weather / space endpoints are not on by default, so we
      only DNS-prefetch them — cheaper than full preconnect and harmless
      if unused.
    -->
    <link rel="preconnect" href="https://api.cesium.com" crossorigin />
    <link rel="preconnect" href="https://assets.ion.cesium.com" crossorigin />
    <link rel="preconnect" href="https://earthquake.usgs.gov" />
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" />
    <link rel="preconnect" href="https://eonet.gsfc.nasa.gov" />
    <link rel="dns-prefetch" href="https://api.airplanes.live" />
    <link rel="dns-prefetch" href="https://opendata.adsb.fi" />
    <link rel="dns-prefetch" href="https://api.adsbdb.com" />
    <link rel="dns-prefetch" href="https://api.rainviewer.com" />
    <link rel="dns-prefetch" href="https://services.swpc.noaa.gov" />
    <link rel="dns-prefetch" href="https://api.open-meteo.com" />
    <link rel="dns-prefetch" href="https://api.spacexdata.com" />
    <link rel="dns-prefetch" href="https://en.wikipedia.org" />
    <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />
  </head>
  <body>
    <div id="root">
      <div id="splash" aria-hidden="true">
        <div class="splash-mark"></div>
        <div class="splash-label">ATLAS</div>
        <div class="splash-bar"><span></span></div>
      </div>
    </div>
    <script>
      document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gestureend', function (e) { e.preventDefault(); }, { passive: false });
      var lastTouch = 0;
      document.addEventListener('touchend', function (e) {
        var now = Date.now();
        if (now - lastTouch < 320) e.preventDefault();
        lastTouch = now;
      }, { passive: false });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
